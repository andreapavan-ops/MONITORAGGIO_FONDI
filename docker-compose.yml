version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://fundmonitor:${DB_PASSWORD}@postgres:5432/funds
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_SENDER: ${EMAIL_SENDER:-onboarding@resend.dev}
      EMAIL_RECIPIENT: ${EMAIL_RECIPIENT:-andreapavan67@gmail.com}
      MONITOR_HOUR: ${MONITOR_HOUR:-17}
      MONITOR_MINUTE: ${MONITOR_MINUTE:-0}
      MONITOR_DAYS: ${MONITOR_DAYS:-1-5}
      RUN_ON_START: ${RUN_ON_START:-true}
    volumes:
      - fund_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: funds
      POSTGRES_USER: fundmonitor
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fundmonitor -d funds"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  fund_data:
  postgres_data:
